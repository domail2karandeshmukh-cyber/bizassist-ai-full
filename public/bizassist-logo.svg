<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="55%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="60" fill="url(#bg)"/>
  <rect width="256" height="256" rx="60" fill="url(#shine)"/>

  <!-- Subtle inner edge -->
  <rect x="3" y="3" width="250" height="250" rx="57" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>

  <!-- B (clean geometric letterform) -->
  <g fill="#ffffff">
    <!-- vertical stem -->
    <rect x="58" y="68" width="20" height="120" rx="3"/>
    <!-- upper bowl -->
    <path d="M 78 68 L 118 68 Q 152 68 152 96 Q 152 116 134 122 Q 152 128 152 152 Q 152 188 116 188 L 78 188 L 78 168 L 114 168 Q 130 168 130 152 Q 130 136 114 136 L 78 136 L 78 116 L 110 116 Q 128 116 128 100 Q 128 88 110 88 L 78 88 Z"/>
  </g>

  <!-- A (modern, slightly italic for energy) -->
  <g fill="#ffffff">
    <path d="M 156 188 L 178 188 L 184 168 L 218 168 L 224 188 L 246 188 L 218 68 L 184 68 Z M 192 148 L 201 116 L 210 148 Z"/>
  </g>

  <!-- Live status indicator -->
  <circle cx="216" cy="48" r="14" fill="#10b981" stroke="#ffffff" stroke-width="4"/>
  <circle cx="216" cy="48" r="6" fill="#ffffff" fill-opacity="0.8"/>
</svg>
